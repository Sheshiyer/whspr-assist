        8.Adjusting volume with temple touch control 9.Smiling at grandchild running
        toward them in warm natural light
    - id: 10B
      key: clinic_experience
      title: The Clinic Journey
      panels: 1.Patient arriving at warm well-lit audiologist clinic 2.Audiologist
        showing WHSPR Assist frame options on clinical display 3.Hearing profile calibration
        with audiogram on screen 4.Patient trying on Assist Rx Classic frames with
        professional guidance 5.Walking out of clinic wearing new glasses with confident
