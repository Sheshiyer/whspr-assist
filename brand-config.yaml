execution_context:
  budget_tier: standard
  launch_channel: enterprise
  maturity_stage: pre-launch
  depth_level: comprehensive
  tone: trust-focused
  quality_bar: premium
brand:
  name: WHSPR Assist
  tagline: Hear more. See more. Live more.
  archetype: The Caregiver
  voice: Dr. Maren -- a 52-year-old optometrist who speaks like a trusted clinician
    talking to someone she has known for years. Direct, warm, free of jargon, never
    condescending. She recommends; she does not sell.
  domain: Assistive Wearable Technology / Hearing & Vision Enhancement
  domain_tags:
  - app
  - dtc
  - enterprise
  - physical-product
  - lifestyle
  - web
  - brand-system
  - premium
  - mobile
  tone: Compassionate Companion (B2C, warmth 8, formality 4, AARP Magazine register),
    Peer Professional (B2B, authority 8, formality 7, clinical peer-to-peer), Trusted
    Advisor (Caregiver, warmth 7, empathetic, solution-oriented)
theme:
  name: Gentle Clarity
  description: Warm, clean medical-grade aesthetic. Soft whites and calming blues
    meet tactile warmth. Clinical credibility without sterile coldness. Accessible
    without patronizing.
  metaphor: A well-lit audiologist's office where the technology feels like a trusted
    friend, not a medical device
  mood_keywords:
  - gentle-clarity
  - warm-clinical
  - dignified-aging
  - accessible-premium
  - trusted-technology
  - compassionate-design
  - clean-confidence
  - soft-authority
  - family-warmth
  - independence
palette:
  primary:
    name: Trust Navy
    hex: '#1B365D'
    role: 60% backgrounds, clinical credibility
  secondary:
    name: Warm Linen
    hex: '#F5F0E8'
    role: 30% text backgrounds, approachable warmth
  accent:
    name: Clarity Teal
    hex: '#2A9D8F'
    role: 10% CTAs, hearing feature highlights
  support:
    name: Soft Silver
    hex: '#B0BEC5'
    role: Borders, device imagery backgrounds
  signal:
    name: Vitality Amber
    hex: '#E9A825'
    role: Active indicators, prescription badges
typography:
  header:
    font: Source Serif 4
    weights:
    - Regular
    - SemiBold
    display_weight: SemiBold
    emphasis_weight: Regular
    case: sentence case
  body:
    font: Source Sans 3
    weights:
    - Regular
    - SemiBold
  data:
    font: IBM Plex Mono
    weights:
    - Regular
materials:
- TR (thermoplastic rubber) frame
- soft-touch temple tips with gesture controls
- hypoallergenic silicone nose pads
- prescription-ready lens system
- magnetic 2-pin charging cable
- microfiber cleaning cloth
- carrying pouch
- large-print quick-start guide
- dual open-ear directional speakers
- dual-microphone ANC/ENC system
photography:
  style: Warm natural light, authentic elderly subjects, active independence, family
    connection, clinical credibility
  environment: Well-lit home, garden, clinic waiting room, family gathering, morning
    routine
  constraint: Always show dignity and independence. No infantilizing poses. No 'old
    person struggling.' Show confidence and capability. Minimum age 50 for primary
    subjects.
  camera: Canon R5, 50mm, f/2.8, warm natural color grade
illustration:
  style: Clean medical-grade line illustrations with warm teal accents. Accessible,
    clear, high contrast.
  references: Apple Health app aesthetic meets Phonak marketing clarity. Warm, not
    cold. Informational, not decorative.
sigil:
  description: Sound wave arc cradling a lens element — hearing and vision unified
  components:
  - Sound wave arc (hearing)
  - Lens circle (vision)
  - Connection dot (app + clinic ecosystem)
audience:
  persona_name: George Mitchell
  aesthetic_affinity: clinical-warm, premium medical device, Apple Health aesthetic
  aspirational_brands: Phonak, ReSound, Apple, Warby Parker
  emotional_register: clinical trust, patient advocacy, professional pride, compassionate
    care
  aspiration:
  - Hear grandchildren clearly at family dinners
  - Read prescription labels and menus independently
  - Participate fully in social activities without pretending
  - Maintain dignity and independence as he ages
  - Stay connected with family without being a burden
  pain_points:
  - Hearing aid stigma prevents adoption despite acknowledged need
  - 'Cost barrier: $3,200 hearing aids on a fixed income feels irresponsible'
  - Generic OTC amplifiers make everything louder, including noise
  - Social withdrawal from restaurants, church, golf, and family events
  - Family tension from repeated 'What?' and avoidance behavior
  - Pretending to hear erodes dignity and self-image
  - Technology anxiety around complicated devices and apps
  - Fear that assistive devices signal loss of independence
competitive_context:
  avoid_visual_patterns: patronizing elderly imagery, budget hearing aid plastic aesthetic,
    tech-bro minimalism, sterile clinical white
  differentiate_from:
  - Only product combining Rx vision + hearing enhancement + AI at any price under
    $1,000
  - 3-17x price advantage over all hearing and vision assistive competitors
  - 'Zero-stigma glasses form factor bypasses #1 adoption barrier'
  - B2B whitelabel creates clinic-level switching costs no competitor offers
  - Professional fitting reduces OTC-level return rates from 35-50% down to 6-10%
  - Dual-purpose product captures vision-hearing convergence whitespace
  - Provider Portal enables patient engagement tracking and upsell pipeline
  - Prescription-ready frames work with any optical lab -- no proprietary lens system
  occupy_territory: The only smart glasses combining prescription hearing enhancement
    AND vision assistance, sold through healthcare professionals
positioning:
  statement: For adults 55-75 with mild-to-moderate hearing loss who already wear
    glasses, WHSPR Assist is the only prescription-ready smart glasses that combine
    hearing enhancement, AI vision assistance, and everyday eyewear in a single frame
    -- for under $350 -- delivering dignity, clarity, and connection without the stigma
    or cost of traditional hearing aids.
  hero_headline: The glasses your audiologist wishes existed ten years ago.
  identity_pillars:
  - Clinical-grade hearing enhancement in everyday eyewear
  - Prescription-ready vision correction built in
  - Trusted delivery through your healthcare provider
  tagline: Hear more. See more. Live more.
  pillars:
  - 'Zero-Stigma Form Factor: Looks like the glasses you already wear, not a medical
    device'
  - 'Radical Affordability: $249-$349 vs $3,200+ hearing aids (90-95% cost reduction)'
  - 'Professional Trust Channel: Prescribed by audiologists and optometrists, not
    sold by websites'
  - 'Dual-Purpose Innovation: Hearing enhancement + AI vision assistance in one frame'
  - 'Dignity-First Design: Enhancement framing, never deficit framing; capability,
    never compensation'
products:
  hero:
    name: WHSPR Assist Rx
    description: Prescription hearing-enhancement smart glasses with vision correction,
      AI-powered camera system, open-ear audio with ANC/ENC, and companion health
      app
    physical_form: Refined TR thermoplastic smart glasses with discreet dual cameras,
      open-ear speakers, and temple touch controls, displayed on warm clinical surface
      with soft-focus family photo in background
  capsule_lineup:
  - name: Assist Rx Classic (V03-T5)
    description: Full-frame square prescription-ready smart glasses in matte black
      TR construction, dual cameras, open-ear hearing enhancement with ANC/ENC, anti-blue
      light or tinted lens options, displayed on frosted glass surface beside warm
      maple charging area
  - name: Assist Rx Heritage (V03-T6)
    description: Round-frame retro prescription-ready smart glasses in matte black
      TR construction, dual cameras, open-ear hearing enhancement, anti-blue light
      or tinted lens options, resting on cotton linen beside audiologist prescription
      card
  - name: Assist Rx Refined (V03-T8)
    description: Semi-rimless prescription-ready smart glasses with metal lower wire
      in matte black TR construction, dual cameras, the lightest model in the lineup,
      anti-blue light or clear lens options, displayed on natural stone surface beside
      leather carrying pouch
  - name: Assist Rx Active (V06-T)
    description: Sport square wrap-around smart glasses with 260mAh extended battery
      and 4GB storage, rubberized grip temples, sport-tinted or polarized lens options
      in white or black frame, designed for active seniors
  essence:
    name: Care Kit
    container: Magnetic charging cable in warm maple organizer with integrated cleaning
      cloth compartment
    size: compact travel-ready
  flatlay_objects:
    count: 5
    items:
    - glasses on warm surface beside magnetic charging cable
    - companion app on large-text iPhone showing hearing profile
    - prescription card from audiologist with WHSPR branding
    - large-print quick-start guide with teal accent illustrations
    - soft carrying pouch with debossed WHSPR logo
  category: assistive wearable technology
aesthetic:
  hero_object_type: warm clinical product photography
  hero_surface: frosted glass with warm maple accent
  seal_material: Brushed titanium
  seal_geometry: clean rounded rectangle with subtle sound-wave motif
  logo_treatment: debossed on warm linen
  logo_substrate: debossed on warm linen stock or brushed titanium
  panel_structure: Clean clinical panels with warm natural light and soft shadows
  icon_line_style: Clean medical-grade line art with teal accent
  poster_artifact: refined assistive device in warm setting
  poster_filament: warm ambient light
  poster_border: clean clinical border with rounded corners
  quality_reference: Apple Health + Phonak marketing quality
  engraving_style: clean medical illustration
  seeker_inner_detail: sound wave patterns meeting vision correction lines
  sequence_type: daily life independence narrative
  sequence_constraint: warm authentic elderly moments
negative_prompt: 'patronizing elderly imagery, walker/wheelchair unless relevant,
  isolation/sadness,

  sterile white clinical, cold fluorescent lighting, generic stock elderly,

  tech-bro aesthetic, young model wearing product, gaming/creator context,

  anime, cartoon, pixel art, low poly, vaporwave, glitch art,

  hearing aid stigma imagery, disability-focused framing,

  chrome excess, neon, cyberpunk, synthwave

  '
