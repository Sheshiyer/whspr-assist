        app on phone showing personalized hearing data and next appointment 8.Family
        gathering with clear conversation, no more asking to repeat 9.Follow-up appointment
        with audiologist reviewing usage analytics
  extended:
    prompt_8a: >
      {brand_name} "The Seeker" persona portrait. George Mitchell, 68,
      wearing WHSPR Assist Rx prescription smart glasses in warm morning light.
      COMPOSITION: Three-quarter portrait, George in his garden doorway.
      He faces camera with quiet confidence, smart glasses clearly visible --
      refined TR thermoplastic frames that look like normal glasses.
      One hand holds a coffee cup, warm natural posture.
      BACKGROUND: Soft-focus family home interior transitioning to garden.
      Morning golden hour light streams in. Depth of field isolates George.
      DETAILS: Warm natural color grade. Linen shirt, casual but dignified.
      Glasses catch light naturally -- subtle {accent_name} ({accent_hex}) glow
      on temple touch controls. No sci-fi overlay. No skeleton. No blueprint.
      TONE: Dignified independence. A capable adult with advanced eyewear.
      Not a patient. Not elderly-struggling. Not a medical device ad.
      COLOR: {color_directive}. Warm natural light dominant.
      {primary_name} ({primary_hex}) in clothing. {secondary_name} ({secondary_hex}) highlights.
      Typography: "THE SEEKER" in {header_font} {header_display_weight},
      {support_name} ({support_hex}).
      Camera: {photo_camera}. {audience_aesthetic}.{detail_suffix}
