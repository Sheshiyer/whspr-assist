      name: Hearing Clarity
      engine_name: HEAR MORE
      tagline: Conversations come back to life
      object: WHSPR Assist Rx glasses on warm maple cradle beside family dinner setting,
        soft candlelight, warm conversation atmosphere
      material_a: titanium
      material_b: maple
      bg_color: Trust Navy
      bg_hex: '#1B365D'
    - id: 9A-02
      name: Vision Independence
      engine_name: SEE MORE
      tagline: Read the menu. Read the road signs. Read life.
      object: WHSPR Assist Rx glasses resting on open book with warm reading light,
        soft linen surface, morning natural light
      material_a: acetate
      material_b: cotton linen
      bg_color: Warm Linen
      bg_hex: '#F5F0E8'
    sequences:
    - id: 10A
      key: morning_routine
      title: A Morning with WHSPR Assist
      panels: 1.Hand reaching for glasses on warm maple charging cradle 2.Putting
